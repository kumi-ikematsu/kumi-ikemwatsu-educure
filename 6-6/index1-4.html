<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>興味があることについてのアンケート</title>
</head>
<body>

  <h1>興味があることについてのアンケート</h1>

  <form action="/submit" method="POST">

    <p>名前：<input type="text" name="name"></p>

    <p>メールアドレス：<input type="email" name="email"></p>

    <p>性別：
      <input type="radio" name="gender" value="male">男性
      <input type="radio" name="gender" value="female">女性
    </p>

    <p>興味のある分野：
      <input type="checkbox" name="field" value="tech">技術
      <input type="checkbox" name="field" value="art">芸術
      <input type="checkbox" name="field" value="science">科学
    </p>

    <p>国：
      <select name="country">
        <option value="japan">日本</option>
        <option value="america">アメリカ</option>
        <option value="uk">イギリス</option>
      </select>
    </p>

    <p>コメント：<br>
      <textarea name="comment" rows="4" cols="50"></textarea>
    </p>

    <input type="submit" value="送信">

  </form>

</body>
</html>
