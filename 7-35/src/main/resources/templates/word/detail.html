<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>単語詳細 - 英単語学習アプリ</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <h1><a th:href="@{/}">英単語学習アプリ</a></h1>
</header>
<main>
    <div class="card">
        <h2>単語詳細</h2>

        <table class="detail-table">
            <tbody>
                <tr>
                    <th>ID</th>
                    <td th:text="${word.id}"></td>
                </tr>
                <tr>
                    <th>英単語</th>
                    <td th:text="${word.english}"></td>
                </tr>
                <tr>
                    <th>日本語訳</th>
                    <td th:text="${word.japanese}"></td>
                </tr>
                <tr>
                    <th>登録日時</th>
                    <td th:text="${#temporals.format(word.createdAt, 'yyyy/MM/dd HH:mm')}"></td>
                </tr>
                <tr>
                    <th>更新日時</th>
                    <td th:text="${#temporals.format(word.updatedAt, 'yyyy/MM/dd HH:mm')}"></td>
                </tr>
            </tbody>
        </table>

        <div class="form-actions" style="margin-top: 24px;">
            <a th:href="@{/words/{id}/edit(id=${word.id})}" class="btn btn-primary">編集</a>
            <form th:action="@{/words/{id}/delete(id=${word.id})}" method="post"
                  onsubmit="return confirm('この単語を削除しますか？');">
                <button type="submit" class="btn btn-danger">削除</button>
            </form>
        </div>

        <a th:href="@{/words}" class="back-link">← 単語一覧へ戻る</a>
    </div>
</main>
</body>
</html>
