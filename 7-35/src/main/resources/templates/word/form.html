<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${wordForm.id} != null ? '単語編集' : '新規単語登録'">単語フォーム</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <h1><a th:href="@{/}">英単語学習アプリ</a></h1>
</header>
<main>
    <div class="card">
        <h2 th:text="${wordForm.id} != null ? '単語を編集する' : '新規単語登録'"></h2>

        <form th:action="${wordForm.id} != null
                         ? @{/words/{id}(id=${wordForm.id})}
                         : @{/words}"
              th:object="${wordForm}"
              method="post">

            <div class="form-group">
                <label for="english">英単語</label>
                <input type="text" id="english" th:field="*{english}"
                       th:readonly="${wordForm.id} != null"
                       placeholder="例: apple">
                <div class="error-message"
                     th:if="${#fields.hasErrors('english')}"
                     th:errors="*{english}"></div>
            </div>

            <div class="form-group">
                <label for="japanese">日本語訳</label>
                <input type="text" id="japanese" th:field="*{japanese}"
                       placeholder="例: りんご">
                <div class="error-message"
                     th:if="${#fields.hasErrors('japanese')}"
                     th:errors="*{japanese}"></div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-success"
                        th:text="${wordForm.id} != null ? '更新する' : '登録する'"></button>
                <a th:href="${wordForm.id} != null
                            ? @{/words/{id}(id=${wordForm.id})}
                            : @{/words}"
                   class="btn btn-secondary">キャンセル</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
