<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>単語編集</title>
</head>
<body>
    <h1>単語編集</h1>

    <form th:action="@{/words/update}" th:object="${word}" method="post">

        <input type="hidden" th:field="*{id}" />

        <label>英単語：</label>
        <input type="text" th:field="*{english}" />

        <label>日本語訳：</label>
        <input type="text" th:field="*{japanese}" />

        <button type="submit">更新</button>
    </form>

    <a href="/words">一覧へ戻る</a>
</body>
</html>
