<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>単語一覧</title>
</head>
<body>
    <h1>単語一覧</h1>
    <a href="/register">新規登録</a>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>英単語</th>
            <th>日本語訳</th>
            <th>操作</th>
        </tr>
        <tr th:each="word : ${words}">
            <td th:text="${word.id}"></td>
            <td th:text="${word.english}"></td>
            <td th:text="${word.japanese}"></td>
            <td>
                <a th:href="@{/words/edit/{id}(id=${word.id})}">編集</a>
                <form th:action="@{/words/delete/{id}(id=${word.id})}" method="post">
                    <button type="submit">削除</button>
                </form>
            </td>
        </tr>
    </table>
</body>
</html>
