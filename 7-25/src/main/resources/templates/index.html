<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>書籍一覧</title>
</head>
<body>
<h1>書籍一覧</h1>

<h2>検索条件</h2>
<form action="/books" method="get">
    タイトル：<input type="text" name="title" th:value="${title}"><br>
    著者：<input type="text" name="author" th:value="${author}"><br>
    価格：<input type="number" name="minPrice" th:value="${minPrice}">円 〜
          <input type="number" name="maxPrice" th:value="${maxPrice}">円<br>
    <button type="submit">検索</button>
    <a href="/books">クリア</a>
</form>

<br>
<a href="/books/create">新規作成</a>

<table border="1">
    <tr>
        <th>ID</th>
        <th>タイトル</th>
        <th>著者</th>
        <th>価格</th>
        <th>登録日時</th>
        <th>操作</th>
    </tr>
    <tr th:each="book : ${books}">
        <td th:text="${book.id}"></td>
        <td th:text="${book.title}"></td>
        <td th:text="${book.author}"></td>
        <td th:text="${book.price}"></td>
        <td th:text="${book.createdAt}"></td>
        <td>
            <a th:href="@{/books/edit/{id}(id=${book.id})}">編集</a>
            <form th:action="@{/books/delete/{id}(id=${book.id})}" method="post"
                  onsubmit="return confirm('削除しますか？')" style="display:inline">
                <button type="submit">削除</button>
            </form>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(books)}">
        <td colspan="6">該当なし</td>
    </tr>
</table>
</body>
</html>
