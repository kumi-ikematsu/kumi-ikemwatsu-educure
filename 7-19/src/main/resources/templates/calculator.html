<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
</head>
<body>
    <h1>Calculator</h1>
    <form action="/calculator/result" method="get">
        <label>Number 1: <input type="number" name="num1"></label><br><br>
        <label>Number 2: <input type="number" name="num2"></label><br><br>
        <label>Operation:
            <select name="operation">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">*</option>
                <option value="/">/</option>
            </select>
        </label><br><br>
        <button type="submit">Calculate</button>
    </form>
</body>
</html>
