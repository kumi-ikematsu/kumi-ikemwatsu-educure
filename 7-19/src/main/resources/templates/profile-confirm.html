<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>プロフィール確認</title>
</head>
<body>
    <h1>プロフィール確認</h1>
    <p>名前: <span th:text="${form.name}"></span></p>
    <p>年齢: <span th:text="${form.age}"></span></p>
    <p>自己紹介: <span th:text="${form.bio}"></span></p>

    <form th:action="@{/profile/{id}/update(id=${id})}" method="post">
        <input type="hidden" name="name" th:value="${form.name}">
        <input type="hidden" name="age" th:value="${form.age}">
        <input type="hidden" name="bio" th:value="${form.bio}">
        <button type="submit">確定</button>
    </form>

    <form th:action="@{/profile/{id}/edit(id=${id})}" method="get">
        <button type="submit">戻る</button>
    </form>
</body>
</html>
