<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ユーザープロフィール</title>
</head>
<body>
    <h1>ユーザープロフィール</h1>
    <p th:if="${message}" th:text="${message}"></p>
    <p>名前: <span th:text="${profile.name}"></span></p>
    <p>年齢: <span th:text="${profile.age}"></span></p>
    <p>自己紹介: <span th:text="${profile.bio}"></span></p>
    <form th:action="@{/profile/{id}/edit(id=${id})}" method="get">
        <button type="submit">編集</button>
    </form>
</body>
</html>
