<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>イベント申し込み期間</title>
</head>
<body>
    <h1>イベント申し込み期間</h1>
    <form th:action="@{/confirm}" th:object="${eventPeriodForm}" method="post">
        <label>開始日：</label>
        <input type="date" th:field="*{startDate}"><br>
        <span th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></span>

        <label>終了日：</label>
        <input type="date" th:field="*{endDate}"><br>
        <span th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></span>

        <br>
        <button type="submit">確認</button>
    </form>
</body>
</html>
