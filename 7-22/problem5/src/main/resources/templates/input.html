<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>割引キャンペーン登録</title>
</head>
<body>
    <h1>割引キャンペーン登録</h1>
    <form th:action="@{/confirm}" th:object="${discountCampaignForm}" method="post">

        <label>キャンペーン名：</label>
        <input type="text" th:field="*{name}">
        <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
        <br>

        <label>割引種別：</label>
        <select th:field="*{type}">
            <option value="fixed">定額</option>
            <option value="percent">定率</option>
        </select>
        <br>

        <label>割引値：</label>
        <input type="text" th:field="*{value}">
        <span th:if="${#fields.hasErrors('value')}" th:errors="*{value}"></span>
        <br>

        <label>開始日：</label>
        <input type="date" th:field="*{startDate}">
        <span th:if="${#fields.hasErrors('startDate')}" th:errors="*{startDate}"></span>
        <br>

        <label>終了日：</label>
        <input type="date" th:field="*{endDate}">
        <span th:if="${#fields.hasErrors('endDate')}" th:errors="*{endDate}"></span>
        <br><br>

        <button type="submit">確認</button>
    </form>
</body>
</html>
