<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>在庫数入力フォーム</title>
</head>
<body>
    <h1>在庫数入力フォーム</h1>
    <form th:action="@{/confirm}" th:object="${productStockForm}" method="post">
        <label>在庫数：</label>
        <input type="text" th:field="*{stock}">
        <span th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></span>
        <br><br>
        <button type="submit">確認</button>
    </form>
</body>
</html>
