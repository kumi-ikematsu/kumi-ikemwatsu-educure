<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Message Board</title>
</head>
<body>
    <h1>Message Board</h1>
    <div style="color: red; font-size: 20px; padding: 10px; border: 1px solid black;">
        <p th:style="'color: ' + ${color} + '; font-size: 20px; padding: 10px; border: 1px solid black;'"
           th:text="${message}"></p>
        <div>
            <p th:text="'Posted at: ' + ${postedAt}"></p>
        </div>
    </div>
</body>
</html>
