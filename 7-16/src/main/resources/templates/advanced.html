<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Advanced Thymeleaf</title>
</head>
<body>
    <h1>User Info</h1>
    <p>Name: <span th:text="${user['name']}"></span></p>
    <p>Role: <span th:text="${user['role']}"></span></p>
    <p th:if="${user['status'] == 'ACTIVE'}">User is active</p>

    <h2>Products</h2>
    <table border="1">
        <tr>
            <th>Product Name</th>
            <th>Price</th>
        </tr>
        <tr th:each="product : ${products}">
            <td th:text="${product.name}"></td>
            <td th:text="${product.price}"></td>
        </tr>
    </table>
</body>
</html>
